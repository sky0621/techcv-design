openapi: 3.1.0
info:
  title: TechCV Resume Management API
  version: 0.1.0
  summary: MVP API for individual web engineer career/resume management
  description: |
    個人のWebエンジニア向け経歴書管理システムのMVP APIです。
    案件中心で経歴を管理し、応募先ごとの経歴書バリエーション作成と出力を提供します。
servers:
  - url: /api
    description: Relative API base path
security:
  - BearerAuth: []
  - SessionAuth: []
tags:
  - name: Auth
  - name: Profile
  - name: EmploymentHistory
  - name: Project
  - name: ProjectContribution
  - name: Skill
  - name: ResumeVariant
  - name: Export
  - name: Dashboard
  - name: Master
paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register user
      operationId: registerUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              basic:
                value:
                  email: me@example.com
                  password: strong-password
                  displayName: sky0621
      responses:
        '201':
          description: Registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              examples:
                success:
                  value:
                    user:
                      id: user_01
                      email: me@example.com
                      displayName: sky0621
                      createdAt: '2025-04-16T00:00:00Z'
                      updatedAt: '2025-04-16T00:00:00Z'
                    accessToken: jwt-token-example
        '400':
          $ref: '#/components/responses/BadRequest'
  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      operationId: loginUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              basic:
                value:
                  email: me@example.com
                  password: strong-password
      responses:
        '200':
          description: Logged in successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              examples:
                success:
                  value:
                    user:
                      id: user_01
                      email: me@example.com
                      displayName: sky0621
                      createdAt: '2025-04-16T00:00:00Z'
                      updatedAt: '2025-04-16T00:00:00Z'
                    accessToken: jwt-token-example
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      operationId: logoutUser
      responses:
        '200':
          $ref: '#/components/responses/Ok'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user
      operationId: getCurrentUser
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                type: object
                required: [user]
                properties:
                  user:
                    $ref: '#/components/schemas/User'
              examples:
                success:
                  value:
                    user:
                      id: user_01
                      email: me@example.com
                      displayName: sky0621
                      createdAt: '2025-04-16T00:00:00Z'
                      updatedAt: '2025-04-16T00:00:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /profile:
    get:
      tags: [Profile]
      summary: Get profile
      operationId: getProfile
      responses:
        '200':
          description: Profile
          content:
            application/json:
              schema:
                type: object
                required: [profile]
                properties:
                  profile:
                    $ref: '#/components/schemas/Profile'
              examples:
                success:
                  value:
                    profile:
                      id: profile_01
                      userId: user_01
                      fullName: Sky Sample
                      nickname: sky0621
                      location: Tokyo
                      email: me@example.com
                      phone: '090-0000-0000'
                      summary: Web engineer focused on product development.
                      githubUrl: https://github.com/sky0621
                      zennUrl: https://zenn.dev/sky0621
                      qiitaUrl: https://qiita.com/sky0621
                      websiteUrl: https://example.com
                      preferredWorkStyle: Full remote
                      visibilitySettings:
                        email: false
                        phone: false
                      createdAt: '2025-04-16T00:00:00Z'
                      updatedAt: '2025-04-16T00:00:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      tags: [Profile]
      summary: Update profile
      operationId: updateProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileUpdateRequest'
            examples:
              basic:
                value:
                  fullName: Sky Sample
                  nickname: sky0621
                  location: Tokyo
                  email: me@example.com
                  phone: '090-0000-0000'
                  summary: Web engineer focused on product development.
                  githubUrl: https://github.com/sky0621
                  preferredWorkStyle: Full remote
                  visibilitySettings:
                    email: false
                    phone: false
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                type: object
                required: [profile]
                properties:
                  profile:
                    $ref: '#/components/schemas/Profile'
              examples:
                success:
                  value:
                    profile:
                      id: profile_01
                      userId: user_01
                      fullName: Sky Sample
                      nickname: sky0621
                      location: Tokyo
                      email: me@example.com
                      phone: '090-0000-0000'
                      summary: Web engineer focused on product development.
                      githubUrl: https://github.com/sky0621
                      zennUrl: https://zenn.dev/sky0621
                      qiitaUrl: https://qiita.com/sky0621
                      websiteUrl: https://example.com
                      preferredWorkStyle: Full remote
                      visibilitySettings:
                        email: false
                        phone: false
                      createdAt: '2025-04-16T00:00:00Z'
                      updatedAt: '2025-04-16T01:00:00Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /employment-histories:
    get:
      tags: [EmploymentHistory]
      summary: List employment histories

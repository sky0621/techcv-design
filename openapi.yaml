              examples:
                success:
                  value:
                    employmentHistories:
                      - id: emp_01
                        userId: user_01
                        companyName: Example Inc.
                        employmentType: Full-time
                        startDate: '2022-04-01'
                        endDate: null
                        note: Main employer
                        sortOrder: 1
                        createdAt: '2025-04-16T00:00:00Z'
                        updatedAt: '2025-04-16T00:00:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:

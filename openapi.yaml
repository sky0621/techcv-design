          schema:
            type: string
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: sourceType
          schema:
            type: string
            enum: [manual, project]
      responses:
        '200':
          description: Skills
          content:
            application/json:
              schema:
                type: object
                required: [skills]
                properties:
                  skills:
                    type: array
                    items:
                      $ref: '#/components/schemas/Skill'
              examples:

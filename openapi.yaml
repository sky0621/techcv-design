  /projects/{projectId}:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [Project]
      summary: Get project
      operationId: getProject
      responses:
        '200':
          description: Project detail
          content:
            application/json:
              schema:
                type: object
                required: [project, contributions, skills]
                properties:
                  project:
                    $ref: '#/components/schemas/Project'
                  contributions:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProjectContribution'
                  skills:
                    type: array
                    items:

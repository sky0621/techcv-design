components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    SessionAuth:
      type: apiKey
      in: cookie
      name: session
  parameters:
    EmploymentHistoryId:
      in: path
      name: employmentHistoryId
      required: true
      schema:
        type: string
      example: emp_01
    ProjectId:
      in: path
      name: projectId
      required: true
      schema:
        type: string
      example: prj_01
    ContributionId:
      in: path
      name: contributionId
      required: true
      schema:
        type: string
      example: ctb_01
    SkillId:
      in: path
      name: skillId
      required: true
      schema:
        type: string
      example: skl_01
    ResumeVariantId:
      in: path
      name: resumeVariantId
      required: true
      schema:
        type: string
      example: rv_01
  responses:
    Ok:
      description: Successful operation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MessageResponse'
          examples:
            success:
              value:
                message: ok
    Created:
      description: Resource created successfully
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MessageResponse'
          examples:
            success:
              value:
                message: created
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            invalid:
              value:
                code: bad_request
                message: Validation failed
                details:
                  field: email
                  reason: invalid format
    Unauthorized:
      description: Authentication required or invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            unauthorized:
              value:
                code: unauthorized
                message: Authentication required
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            notFound:
              value:
                code: not_found
                message: Resource not found
  schemas:
    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

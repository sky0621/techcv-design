  /projects:
    get:
      tags: [Project]
      summary: List projects
      operationId: listProjects
      parameters:
        - in: query
          name: employmentHistoryId
          schema:
            type: string
        - in: query
          name: role
          schema:
            type: string
        - in: query
          name: skill
          schema:
            type: string
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
            enum: [draft, published]
        - in: query
          name: sort
          schema:
            type: string
            example: updatedAt:desc
      responses:
        '200':
          description: Projects
          content:
            application/json:
              schema:
                type: object
                required: [projects]
                properties:
                  projects:
                    type: array
                    items:
                      $ref: '#/components/schemas/Project'
              examples:
                success:
                  value:
                    projects:
                      - id: prj_01
                        userId: user_01
                        employmentHistoryId: emp_01
                        name: TechCV Resume System
                        startDate: '2024-01-01'
                        endDate: null
                        overview: Resume management product for web engineers
                        role: Backend Engineer
                        teamSize: 3
                        status: draft
                        sortOrder: 1
                        createdAt: '2025-04-16T00:00:00Z'
                        updatedAt: '2025-04-16T00:00:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:

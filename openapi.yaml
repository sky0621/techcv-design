        '401':
          $ref: '#/components/responses/Unauthorized'
  /employment-histories/{employmentHistoryId}:
    parameters:
      - $ref: '#/components/parameters/EmploymentHistoryId'
    get:
      tags: [EmploymentHistory]
      summary: Get employment history
      operationId: getEmploymentHistory
